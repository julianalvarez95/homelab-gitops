apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: phoenix-data
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:version-19.4.0
          ports:
            - name: ui
              containerPort: 6006
            - name: otlp-grpc
              containerPort: 4317
          env:
            - name: PHOENIX_WORKING_DIR
              value: /mnt/data
            - name: PHOENIX_DEFAULT_RETENTION_POLICY_DAYS
              value: "10"
            # Kubernetes auto-injects a PHOENIX_PORT env var of the form
            # "tcp://<ip>:6006" into every pod once a Service named
            # "phoenix" exists in the namespace, because it links every
            # Service as <NAME>_PORT. Phoenix's own config expects
            # PHOENIX_PORT/PHOENIX_GRPC_PORT to be plain integers, so this
            # collision crashes the container on start unless overridden
            # explicitly here.
            - name: PHOENIX_PORT
              value: "6006"
            - name: PHOENIX_GRPC_PORT
              value: "4317"
          volumeMounts:
            - name: phoenix-data
              mountPath: /mnt/data
      volumes:
        - name: phoenix-data
          persistentVolumeClaim:
            claimName: phoenix-data
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: observability
spec:
  selector:
    app: phoenix
  ports:
    - name: ui
      port: 6006
      targetPort: ui
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
