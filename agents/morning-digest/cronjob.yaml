apiVersion: batch/v1
kind: CronJob
metadata:
  name: morning-digest
  namespace: default
spec:
  schedule: "0 10 * * *"
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: morning-digest
            image: ghcr.io/julianalvarez95/morning-digest:latest
            imagePullPolicy: Always
            envFrom:
            - secretRef:
                name: morning-digest-secrets
            env:
            - name: PHOENIX_COLLECTOR_ENDPOINT
              # Necesita el esquema explícito: sin "http://", phoenix.otel
              # no puede inferir el protocolo y arma una URL rota
              # (probado localmente, ver CLAUDE.md).
              value: "http://phoenix.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: "2"
            - name: VICTORIA_METRICS_URL
              value: "http://victoria-metrics.observability.svc.cluster.local:8428/api/v1/import/prometheus"
            volumeMounts:
            - name: feeds-config
              mountPath: /config
          volumes:
          - name: feeds-config
            configMap:
              name: morning-digest-feeds
