apiVersion: batch/v1
kind: CronJob
metadata:
  name: morning-digest
  namespace: default
spec:
  schedule: "0 10 * * *"
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: morning-digest
            image: ghcr.io/julianalvarez95/morning-digest:latest
            imagePullPolicy: Always
            envFrom:
            - secretRef:
                name: morning-digest-secrets
            env:
            - name: PHOENIX_COLLECTOR_ENDPOINT
              value: "phoenix.observability.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_TIMEOUT
              value: "2"
            volumeMounts:
            - name: feeds-config
              mountPath: /config
          volumes:
          - name: feeds-config
            configMap:
              name: morning-digest-feeds
